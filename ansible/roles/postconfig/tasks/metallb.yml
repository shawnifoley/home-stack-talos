---
- name: Install MetalLB
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_yaml }}"
    state: present
    src: "https://raw.githubusercontent.com/metallb/metallb/{{ metallb_version }}/config/manifests/metallb-native.yaml"

- name: Ensure MetalLB controller can run on control-plane nodes
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_yaml }}"
    state: patched
    api_version: apps/v1
    kind: Deployment
    name: controller
    namespace: metallb-system
    definition:
      spec:
        template:
          spec:
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
              - key: node-role.kubernetes.io/master
                operator: Exists
                effect: NoSchedule

- name: Check MetalLB memberlist secret
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_yaml }}"
    api_version: v1
    kind: Secret
    namespace: metallb-system
    name: memberlist
  register: metallb_memberlist_secret

- name: Create MetalLB memberlist secret when missing
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_yaml }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: memberlist
        namespace: metallb-system
      type: Opaque
      stringData:
        secretkey: "{{ lookup('ansible.builtin.password', '/dev/null length=128') }}"
  when: (metallb_memberlist_secret.resources | default([]) | length) == 0

- name: Wait for MetalLB controller deployment to be ready
  kubernetes.core.k8s:
    api_version: apps/v1
    kind: Deployment
    name: controller
    namespace: metallb-system
    kubeconfig: "{{ kubeconfig_yaml }}"
    wait: true
    wait_timeout: 300

- name: Wait for MetalLB speaker DaemonSet to be ready
  kubernetes.core.k8s:
    api_version: apps/v1
    kind: DaemonSet
    name: speaker
    namespace: metallb-system
    kubeconfig: "{{ kubeconfig_yaml }}"
    wait: true
    wait_timeout: 300

- name: Configure MetalLB IPAddressPool
  kubernetes.core.k8s:
    state: present
    namespace: metallb-system
    kubeconfig: "{{ kubeconfig_yaml }}"
    definition:
      apiVersion: metallb.io/v1beta1
      kind: IPAddressPool
      metadata:
        name: default
      spec:
        addresses:
          - "{{ metallb_range }}"

- name: Configure MetalLB L2Advertisement
  kubernetes.core.k8s:
    state: present
    namespace: metallb-system
    kubeconfig: "{{ kubeconfig_yaml }}"
    definition:
      apiVersion: metallb.io/v1beta1
      kind: L2Advertisement
      metadata:
        name: default
      spec:
        ipAddressPools:
          - default
