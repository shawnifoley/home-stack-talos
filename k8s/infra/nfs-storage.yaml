apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-tank-root
spec:
  capacity:
    storage: 11Ti
  accessModes:
    - ReadWriteMany
  mountOptions:
    - vers=4.2
    - proto=tcp
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 192.168.1.202
    path: /tank
