apiVersion: apps/v1
kind: Deployment
metadata:
  name: slurmctld
  namespace: slurm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slurmctld
  template:
    metadata:
      labels:
        app: slurmctld
    spec:
      containers:
        - name: slurmctld
          image: ghcr.io/giovtorres/slurm-docker-cluster:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
            - |
              munged --foreground --force &
              sleep 2
              slurmctld -Dvvv
          ports:
            - containerPort: 6817
          volumeMounts:
            - name: slurm-conf
              mountPath: /etc/slurm/slurm.conf
              subPath: slurm.conf
            - name: munge-key
              mountPath: /etc/munge/munge.key
              subPath: munge.key
            - name: state
              mountPath: /var/spool/slurmctld
      volumes:
        - name: slurm-conf
          configMap:
            name: slurm-config
        - name: munge-key
          secret:
            secretName: munge-key
            defaultMode: 0400
        - name: state
          emptyDir: {}

