apiVersion: apps/v1
kind: Deployment
metadata:
  name: slurm-login
  namespace: slurm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slurm-login
  template:
    metadata:
      labels:
        app: slurm-login
    spec:
      containers:
        - name: slurm-login
          image: ghcr.io/giovtorres/slurm-docker-cluster:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
            - |
              munged --foreground --force &
              sleep infinity
          volumeMounts:
            - name: slurm-conf
              mountPath: /etc/slurm/slurm.conf
              subPath: slurm.conf
            - name: munge-key
              mountPath: /etc/munge/munge.key
              subPath: munge.key
      volumes:
        - name: slurm-conf
          configMap:
            name: slurm-config
        - name: munge-key
          secret:
            secretName: munge-key
            defaultMode: 0400

