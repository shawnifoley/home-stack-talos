apiVersion: v1
kind: PersistentVolume
metadata:
  name: slurm-home
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  mountOptions:
    - vers=4.2
    - proto=tcp
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  nfs:
    server: 192.168.1.202
    path: /tank/slurm-home

